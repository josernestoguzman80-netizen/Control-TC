<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Bancario Profesional - Jose Guzman</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --danger: #e74c3c; --info: #3498db; --warning: #f39c12; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; padding: 10px; color: #333; margin: 0; }
        
        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--primary); border-bottom: 3px solid var(--secondary); padding-bottom: 10px; font-size: 1.5rem; }
        
        .config-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; background: #ebf2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        input[readonly] { background-color: #e9ecef; color: #6c757d; cursor: not-allowed; }

        .form-compra { background: #fff; border: 2px solid #eee; padding: 15px; border-radius: 10px; display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 30px; }
        
        @media (min-width: 600px) {
            .form-compra { grid-template-columns: 2fr 1fr 1.5fr auto; align-items: end; }
            h1 { font-size: 2rem; }
            .container { padding: 30px; }
        }

        button.btn-add { background: var(--secondary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; width: 100%; }
        
        .ciclo-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .ciclo-header { background: var(--primary); color: white; padding: 15px; font-weight: bold; display: flex; flex-direction: column; gap: 10px; }
        
        @media (min-width: 600px) {
            .ciclo-header { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .btn-pagar-todo { background: var(--info); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f8f9fa; padding: 10px; text-align: left; font-size: 0.85rem; border-bottom: 2px solid #dee2e6; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }

        .btn-delete { background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        .check-pago { transform: scale(1.2); cursor: pointer; }
        .pagado { text-decoration: line-through; color: #aaa; background-color: #f9f9f9; }

        .resumen-footer { display: grid; grid-template-columns: 1fr 1fr; background: #fffaf0; border-top: 2px solid #eee; }
        .resumen-item { padding: 15px; text-align: center; border-right: 1px solid #eee; }
        .monto-footer { font-size: 1.1rem; font-weight: bold; display: block; margin-top: 5px; }

        .banner-ultimo-dia { background: var(--primary); color: white; padding: 12px; text-align: center; font-size: 0.95rem; line-height: 1.4; }
        .banner-ultimo-dia b { color: #ffeb3b; }

        .gran-total-pendiente { background: var(--warning); color: white; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3); }
        .monto-grande { font-size: 1.5rem; font-weight: bold; display: block; margin-top: 10px; }

        /* Botón de reinicio */
        .btn-reset { background-color: #95a5a6; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-top: 20px; width: 100%; transition: 0.3s; }
        .btn-reset:hover { background-color: var(--danger); }
    </style>
</head>
<body onload="cargarDatos()">

<div class="container">
    <h1>Calendario de Pagos y Compras</h1>

    <div class="config-bar">
        <div class="input-group"><label>Día de Corte:</label><input type="number" value="15" readonly></div>
        <div class="input-group"><label>Día de Pago:</label><input type="number" value="10" readonly></div>
        <div class="input-group"><label>Tasa Anual (%):</label><input type="number" value="60" readonly></div>
    </div>

    <div class="form-compra">
        <div class="input-group"><label>Descripción:</label><input type="text" id="desc" placeholder="Ej: Gasolina"></div>
        <div class="input-group"><label>Monto (Q):</label><input type="number" id="monto" placeholder="0.00" step="0.01"></div>
        <div class="input-group"><label>Fecha:</label><input type="date" id="fechaCompra"></div>
        <button class="btn-add" onclick="registrar()">Registrar</button>
    </div>

    <div id="contenedorCiclos"></div>

    <div id="cajaGranTotal" class="gran-total-pendiente" style="display:none;">
        <span style="font-size: 0.85rem;">TOTAL PENDIENTE (CAPITAL + INTERÉS):</span>
        <span class="monto-grande">Q<span id="sumaPendienteGeneral">0.00</span></span>
        <div style="font-size: 0.8rem; margin-top: 5px; opacity: 0.9;">
            Cap: Q<span id="soloCapital">0.00</span> | Int: Q<span id="soloInteres">0.00</span>
        </div>
    </div>

    <button class="btn-reset" onclick="reiniciarTodo()">Reiniciar toda la aplicación (Borrar datos)</button>
</div>

<script>
    let todasLasCompras = [];
    const CORTE = 15;
    const PAGO = 10;
    const TASA_MENSUAL = 0.05;

    function guardarDatos() {
        localStorage.setItem('datosComprasGuzman', JSON.stringify(todasLasCompras));
    }

    function cargarDatos() {
        const datos = localStorage.getItem('datosComprasGuzman');
        if (datos) { todasLasCompras = JSON.parse(datos); render(); }
    }

    // FUNCIÓN PARA REINICIAR
    function reiniciarTodo() {
        const confirmar = confirm("¿Estás seguro de que quieres borrar TODOS los datos? Esta acción no se puede deshacer.");
        if (confirmar) {
            todasLasCompras = [];
            localStorage.removeItem('datosComprasGuzman');
            render();
            alert("Datos borrados correctamente.");
        }
    }

    function registrar() {
        const d = document.getElementById('desc').value;
        const m = parseFloat(document.getElementById('monto').value);
        const fTxt = document.getElementById('fechaCompra').value;
        if (!d || isNaN(m) || !fTxt) return alert("Llena todos los campos.");

        const partes = fTxt.split('-');
        const f = new Date(partes[0], partes[1]-1, partes[2]);
        let fLimite = new Date(f);
        if (f.getDate() > CORTE) fLimite.setMonth(fLimite.getMonth() + 2);
        else fLimite.setMonth(fLimite.getMonth() + 1);
        fLimite.setDate(PAGO);

        todasLasCompras.push({
            id: Date.now(), desc: d, monto: m, pagado: false,
            fechaStr: f.toLocaleDateString('es-GT'),
            fechaLimiteStr: fLimite.toLocaleDateString('es-GT'),
            mesSort: fLimite.getFullYear() * 100 + (fLimite.getMonth() + 1),
            nombreCiclo: fLimite.toLocaleDateString('es-GT', { month: 'long', year: 'numeric' })
        });
        document.getElementById('desc').value = ""; document.getElementById('monto').value = "";
        guardarDatos(); render();
    }

    function toggle(id) {
        const i = todasLasCompras.findIndex(x => x.id === id);
        todasLasCompras[i].pagado = !todasLasCompras[i].pagado;
        guardarDatos(); render();
    }

    function pagarTodoElMes(mesSort) {
        todasLasCompras.forEach(c => { if (c.mesSort == mesSort) c.pagado = true; });
        guardarDatos(); render();
    }

    function borrar(id) {
        todasLasCompras = todasLasCompras.filter(x => x.id !== id);
        guardarDatos(); render();
    }

    function render() {
        const cont = document.getElementById('contenedorCiclos');
        cont.innerHTML = "";
        let capPendTotal = 0;

        const grupos = {};
        todasLasCompras.forEach(c => {
            if (!grupos[c.mesSort]) grupos[c.mesSort] = { nombre: c.nombreCiclo, limite: c.fechaLimiteStr, items: [] };
            grupos[c.mesSort].items.push(c);
        });

        Object.keys(grupos).sort((a,b) => a-b).forEach(k => {
            const ciclo = grupos[k];
            let pendienteCiclo = 0;
            ciclo.items.forEach(item => { if (!item.pagado) { pendienteCiclo += item.monto; capPendTotal += item.monto; } });

            let html = `
                <div class="ciclo-card">
                    <div class="ciclo-header">
                        <span>PAGO DE ${ciclo.nombre.toUpperCase()}</span>
                        <button class="btn-pagar-todo" onclick="pagarTodoElMes(${k})">Marcar todo como pagado</button>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>¿Pág?</th><th>Fecha</th><th>Desc</th><th>Monto</th><th>X</th></tr></thead>
                            <tbody>`;

            ciclo.items.forEach(item => {
                html += `<tr class="${item.pagado ? 'pagado' : ''}">
                    <td><input type="checkbox" class="check-pago" ${item.pagado ? 'checked' : ''} onchange="toggle(${item.id})"></td>
                    <td>${item.fechaStr}</td><td>${item.desc}</td><td>Q${item.monto.toFixed(2)}</td>
                    <td><button class="btn-delete" onclick="borrar(${item.id})">×</button></td>
                </tr>`;
            });

            const intCiclo = pendienteCiclo * TASA_MENSUAL;

            html += `</tbody></table></div>
                    <div class="resumen-footer">
                        <div class="resumen-item"><small>PENDIENTE</small><br><span class="monto-footer" style="color:var(--info)">Q${pendienteCiclo.toFixed(2)}</span></div>
                        <div class="resumen-item"><small>INTERÉS</small><br><span class="monto-footer" style="color:var(--danger)">Q${intCiclo.toFixed(2)}</span></div>
                    </div>
                    <div class="banner-ultimo-dia">
                        Vence: <b>${ciclo.limite}</b><br>Pendiente: <b>Q${pendienteCiclo.toFixed(2)}</b>
                    </div>
                </div>`;
            cont.innerHTML += html;
        });

        const intGen = capPendTotal * TASA_MENSUAL;
        document.getElementById('soloCapital').innerText = capPendTotal.toFixed(2);
        document.getElementById('soloInteres').innerText = intGen.toFixed(2);
        document.getElementById('sumaPendienteGeneral').innerText = (capPendTotal + intGen).toFixed(2);
        document.getElementById('cajaGranTotal').style.display = todasLasCompras.length > 0 ? "block" : "none";
    }
</script>
</body>
</html>
